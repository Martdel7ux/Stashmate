services:
  postgres:
    image: postgres:16-alpine
    container_name: savingsapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: savingsapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: SavingsApp.API/Dockerfile
    container_name: savingsapp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=savingsapp;Username=postgres;Password=postgres"
      Jwt__Secret: "dev-only-insecure-secret-change-me-min-32-chars-long-1234567890"
    ports:
      - "8080:8080"

volumes:
  pgdata:
